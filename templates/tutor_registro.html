<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>DATACORE | REGISTRO TUTOR</title>
    <style>
        body { font-family: monospace; background: #f4f4f4; display: flex; justify-content: center; align-items: flex-start; height: auto; padding: 40px 0; margin: 0; }
        .card { background: white; padding: 30px; border: 2px solid #000; box-shadow: 10px 10px 0px #000; width: 450px; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #000; box-sizing: border-box; font-family: monospace; }
        button { width: 100%; padding: 10px; background: #000; color: #fff; cursor: pointer; border: none; font-weight: bold; font-family: monospace; margin-top: 15px; }
        button:hover { background: #333; }
        hr { border: 0; border-top: 2px dashed #000; margin: 20px 0; }
        .seccion-titulo { font-weight: bold; text-transform: uppercase; margin-top: 15px; display: block; background: #000; color: #fff; padding: 5px; text-align: center; }
    </style>
</head>
<body>
    <div class="card">
        <h2>REGISTRO DE TUTORES</h2>
        <p style="margin-top: -10px; font-size: 11px; color: #666;">Modulo 3: Familiares y Responsables Legales</p>
        
        <form action="/tutor/registrar" method="POST">
            
            <span class="seccion-titulo">Vinculacion Obligatoria</span>

            <label>Asignar este tutor al Nino(a):</label>
            <select name="id_nna" required>
                <option value="" disabled selected>-- Selecciona al NNA protegido --</option>
                {% for n in niños %}
                    <option value="{{ n.id_nna }}">{{ n.apellido_p }} {{ n.nombre }} (ID: {{ n.id_nna }})</option>
                {% endfor %}
            </select>

            <label>Parentesco con el menor:</label>
            <select name="id_paren" required>
                <option value="" disabled selected>-- Tipo de Relacion --</option>
                {% for p in parentescos %}
                    <option value="{{ p.id_paren }}">{{ p.nom_paren }}</option>
                {% endfor %}
            </select>

            <label>¿Posee la Patria Potestad / Tutoria Legal?:</label>
            <select name="tutor_legal" required>
                <option value="1">SI, ES EL TUTOR LEGAL</option>
                <option value="0">NO, SOLO FAMILIAR / CONTACTO</option>
            </select>

            <hr>
            <span class="seccion-titulo">Datos del Tutor</span>

            <label>Nombre(s):</label>
            <input type="text" name="nombre" placeholder="Nombre completo" required>

            <label>Apellido Paterno:</label>
            <input type="text" name="apellido_p" placeholder="Apellido Paterno" required>

            <label>Apellido Materno:</label>
            <input type="text" name="apellido_m" placeholder="Apellido Materno" required>
            
            <label>CURP:</label>
            <input type="text" name="curp" placeholder="CURP del tutor" required maxlength="18">
            
            <label>Fecha de Nacimiento:</label>
            <input type="date" name="fecha_nacimiento" required>

            <label>Sexo:</label>
            <select name="id_sexo" required>
                <option value="" disabled selected>-- Selecciona un sexo --</option>
                {% for s in sexos %}
                    <option value="{{ s.id_sexo }}">{{ s.nom_sexo }}</option>
                {% endfor %}
            </select>

            <label>Ocupacion principal:</label>
            <input type="text" name="ocupacion" placeholder="Ej. Empleado de comercio, Hogar" required>

            <hr>
            <span class="seccion-titulo">Direccion del Tutor</span>

            <label>Estado:</label>
            <input type="text" name="estado" placeholder="Ej. CDMX" required>

            <label>Municipio / Alcaldia:</label>
            <input type="text" name="municipio" placeholder="Ej. Gustavo A. Madero" required>

            <label>Colonia:</label>
            <input type="text" name="colonia" placeholder="Ej. La Escalera" required>

            <label>Codigo Postal (CP):</label>
            <input type="text" name="cp" placeholder="Ej. 07320" required maxlength="10">

            <label>Calle:</label>
            <input type="text" name="calle" placeholder="Ej. Av. Juan de Dios Batiz" required>

            <label>Numero Exterior:</label>
            <input type="text" name="numero_ext" placeholder="Ej. 45" required>

            <label>Numero Interior (Opcional):</label>
            <input type="text" name="numero_int" placeholder="Ej. Casa B">

            <button type="submit">VINCULAR Y GUARDAR TUTOR</button>
        </form>
        <p style="text-align: center;"><a href="/dashboard" style="color:#000;">Volver al Dashboard</a></p>
    </div>
    <script src="{{ url_for('static', filename='js/boton_inicio.js') }}"></script>
</body>
</html>
