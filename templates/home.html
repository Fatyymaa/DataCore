<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>DATACORE | HOME</title>
    <style>
        body { 
            font-family: 'Courier New', Courier, monospace; 
            margin: 0; 
            padding: 0; 
            background: #f4f4f4; 
        }
        
        /* Barra de navegación superior */
        .navbar {
            background: #000;
            color: #fff;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between; /* Esto empuja los elementos a los extremos */
            align-items: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .bienvenida {
            font-size: 18px;
            font-weight: bold;
        }

        .btn-logout {
            color: #fff;
            text-decoration: none;
            border: 1px solid #fff;
            padding: 8px 15px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn-logout:hover {
            background: #fff;
            color: #000;
        }

        .contenido-principal {
            text-align: center;
            margin-top: 100px;
        }

        .mensaje-central {
            background: white;
            display: inline-block;
            padding: 40px;
            border: 2px solid #000;
            box-shadow: 10px 10px 0px #000;
        }
        /* Estilo de la burbujita de notificación */
.burbuja-notificacion {
    position: fixed;
    top: 80px; /* Para que aparezca debajo de tu navbar negra */
    right: 20px;
    background-color: #28a745; /* Verde éxito */
    color: white;
    padding: 15px 25px;
    border: 2px solid #000;
    box-shadow: 5px 5px 0px #000;
    font-family: monospace;
    font-weight: bold;
    z-index: 1000;
    /* Animación para que aparezca suave */
    animation: slideIn 0.5s ease-out;
}

@keyframes slideIn {
    from { transform: translateX(100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
}
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="bienvenida">
            BIENVENIDO, {{ nombre.upper() }}
        </div>
        <div>
            <a href="/logout" class="btn-logout">CERRAR SESIÓN</a>
        </div>
    </nav>

{% if request.args.get('registro') == 'exitoso' %}
    <div class="burbuja-notificacion">
         CUENTA REGISTRADA<br>
        <small style="font-size: 0.8em;">Espere activación del Director</small>
    </div>
{% endif %}

    <div class="contenido-principal">
        <div class="mensaje-central">
            <h2>SISTEMA DE GESTIÓN FUNDACIÓN</h2>
            <p>Has iniciado sesión correctamente como especialista.</p>
        </div>
    </div>

</body>
</html>
