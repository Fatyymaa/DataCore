<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>DATACORE | MODIFICAR NNA</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/editarNNA.css') }}">
</head>
<body>
    <header>
        <div>
            <strong style="text-transform: uppercase;">Modo Edición: {{ nna.nombre }} {{ nna.apellido_p or '' }}</strong>
        </div>
        <a href="{{ url_for('detalle_nna', id_nna=nna.id_nna) }}">VOLVER AL DETALLE</a>
    </header>

    <main style="padding: 30px; display: flex; justify-content: center;">
        <div class="form-container" style="max-width: 850px; width: 100%;">
            
            <form action="{{ url_for('editar_nna', id_nna=nna.id_nna) }}" method="POST">
                
                <h3 style="text-transform: uppercase; border-bottom: 2px solid #000; padding-bottom: 5px; margin-top: 0; font-size: 16px;">1. Identidad del NNA</h3>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px;">
                    <div class="form-group">
                        <label>Folio NNA *</label>
                        <input type="text" name="folio_nna" value="{{ nna.folio_nna or '' }}" required>
                    </div>
                    <div class="form-group">
                        <label>Nombre(s) *</label>
                        <input type="text" name="nombre" value="{{ nna.nombre }}" required>
                    </div>
                    <div class="form-group">
                        <label>Apellido Paterno</label>
                        <input type="text" name="apellido_p" value="{{ nna.apellido_p or '' }}">
                    </div>
                    <div class="form-group">
                        <label>Apellido Materno</label>
                        <input type="text" name="apellido_m" value="{{ nna.apellido_m or '' }}">
                    </div>
                    <div class="form-group">
                        <label>CURP</label>
                        <input type="text" name="curp" value="{{ nna.curp or '' }}" maxlength="18" style="text-transform: uppercase;">
                    </div>
                    <div class="form-group">
                        <label>Fecha de Nacimiento</label>
                        <input type="date" name="fecha_nacimiento" value="{{ nna.fecha_nacimiento or '' }}">
                    </div>
                    <div class="form-group">
                        <label>Sexo</label>
                        <select name="id_sexo">
                            <option value="">-- SELECCIONAR --</option>
                            {% for s in cat_sexo %}
                            <option value="{{ s.id_sexo }}" {% if nna.id_sexo == s.id_sexo %}selected{% endif %}>{{ s.nom_sexo }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Lugar de Nacimiento (Estado)</label>
                        <select name="lugar_nacimiento">
                            <option value="">-- SELECCIONAR ESTADO --</option>
                            {% for est in cat_estados %}
                            <option value="{{ est.id_ent }}" {% if nna.lugar_nacimiento == est.id_ent %}selected{% endif %}>{{ est.nom_ent }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <h3 style="text-transform: uppercase; border-bottom: 2px solid #000; padding-bottom: 5px; margin-top: 20px; font-size: 16px;">2. Indicadores de Contexto</h3>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 25px;">
                    <div class="form-group">
                        <label>Escolaridad</label>
                        <select name="id_esc">
                            <option value="">-- SELECCIONAR --</option>
                            {% for esc in cat_escolaridad %}
                            <option value="{{ esc.id_esc }}" {% if nna.id_esc == esc.id_esc %}selected{% endif %}>{{ esc.nom_esc }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Lengua / Variante</label>
                        <select name="id_len">
                            <option value="">-- NINGUNA / DESCONOCIDA --</option>
                            {% for len in cat_lenguas %}
                            <option value="{{ len.id_len }}" {% if nna.id_len == len.id_len %}selected{% endif %}>{{ len.variante_len }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Condición Médica</label>
                        <select name="id_condicion">
                            <option value="">-- SIN DIAGNÓSTICO --</option>
                            {% for cond in cat_condiciones %}
                            <option value="{{ cond.id_condicion }}" {% if nna.id_condicion == cond.id_condicion %}selected{% endif %}>{{ cond.nombre }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <h3 style="text-transform: uppercase; border-bottom: 2px solid #000; padding-bottom: 5px; margin-top: 20px; font-size: 16px;">3. Domicilio Actual</h3>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
                    <div class="form-group">
                        <label>Calle *</label>
                        <input type="text" name="calle" value="{{ nna.calle or '' }}" required>
                    </div>
                    <div class="form-group">
                        <label>Número Ext *</label>
                        <input type="text" name="numero_ext" value="{{ nna.numero_ext or '' }}" required>
                    </div>
                    <div class="form-group">
                        <label>Número Int</label>
                        <input type="text" name="numero_int" value="{{ nna.numero_int or '' }}">
                    </div>
                    <div class="form-group">
                        <label>Código Postal *</label>
                        <input type="text" name="cp_asen" value="{{ nna.cp_asen or '' }}" maxlength="5" required>
                    </div>
                    <div class="form-group">
                        <label>Colonia *</label>
                        <input type="text" name="nom_col" value="{{ nna.nom_col or '' }}" required>
                    </div>
                    <div class="form-group">
                        <label>Municipio / Alcaldía *</label>
                        <input type="text" name="nom_mun" value="{{ nna.nom_mun or '' }}" required>
                    </div>
                    <div class="form-group" style="grid-column: span 2;">
                        <label>Estado de Residencia *</label>
                        <select name="id_ent_domicilio" required>
                            <option value="">-- SELECCIONAR ESTADO --</option>
                            {% for est in cat_estados %}
                            <option value="{{ est.id_ent }}" {% if nna.id_ent_domicilio == est.id_ent %}selected{% endif %}>{{ est.nom_ent }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group" style="grid-column: span 2;">
                        <label>Referencias Geográficas</label>
                        <input type="text" name="referencias" value="{{ nna.referencias or '' }}">
                    </div>
                </div>

                <div style="display: flex; justify-content: flex-end; gap: 15px; margin-top: 30px;">
                    <a href="{{ url_for('detalle_nna', id_nna=nna.id_nna) }}" class="btn-action" style="display: flex; align-items: center; padding: 10px 20px; font-size: 14px;">CANCELAR</a>
                    <button type="submit" class="btn-submit" style="padding: 12px 25px; font-size: 14px;">GUARDAR CAMBIOS</button>
                </div>

            </form>
        </div>
    </main>
</body>
</html>
