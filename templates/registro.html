<!DOCTYPE html>
<html>
<head>
    <title>DATACORE | REGISTRO</title>
    <style>
        body { font-family: monospace; background: #f4f4f4; display: flex; justify-content: center; align-items: flex-start; height: auto; padding: 40px 0; margin: 0; }
        .card { background: white; padding: 30px; border: 2px solid #000; box-shadow: 10px 10px 0px #000; width: 450px; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #000; box-sizing: border-box; font-family: monospace; }
        button { width: 100%; padding: 10px; background: #000; color: #fff; cursor: pointer; border: none; font-weight: bold; font-family: monospace; margin-top: 15px; }
        button:hover { background: #333; }
        hr { border: 0; border-top: 2px dashed #000; margin: 20px 0; }
        .seccion-titulo { font-weight: bold; text-transform: uppercase; margin-top: 15px; display: block; background: #000; color: #fff; padding: 5px; text-align: center; }
    </style>
</head>
<body>
    <div class="card">
        <h2>REGISTRO DE PERSONAL</h2>
        
        <form action="/registrar" method="POST">
            
            <span class="seccion-titulo">Datos Personales</span>

            <label>Nombre Completo:</label>
            <input type="text" name="nombre_completo" placeholder="Nombre y Apellidos" required>

            <label>RFC:</label>
            <input type="text" name="rfc" placeholder="RFC" required maxlength="13">
            
            <label>CURP:</label>
            <input type="text" name="curp" placeholder="CURP" required maxlength="18">
            
            <label>Fecha de Nacimiento:</label>
            <input type="date" name="fecha_nacimiento" required>

            <label>Sexo:</label>
            <select name="sexo">
                <option value="MASCULINO">MASCULINO</option>
                <option value="FEMENINO">FEMENINO</option>
            </select>

            <hr>
            <span class="seccion-titulo">Dirección Normalizada</span>

            <label>Estado:</label>
            <input type="text" name="estado" placeholder="Ej. CDMX" required>

            <label>Municipio / Alcaldía:</label>
            <input type="text" name="municipio" placeholder="Ej. Gustavo A. Madero" required>

            <label>Colonia:</label>
            <input type="text" name="colonia" placeholder="Ej. La Escalera" required>

            <label>Código Postal (CP):</label>
            <input type="text" name="cp" placeholder="Ej. 07320" required maxlength="10">

            <label>Calle:</label>
            <input type="text" name="calle" placeholder="Ej. Av. Juan de Dios Bátiz" required>

            <label>Número Exterior:</label>
            <input type="text" name="numero_ext" placeholder="Ej. 123" required>

            <label>Número Interior (Opcional):</label>
            <input type="text" name="numero_int" placeholder="Ej. Depto 4B (Dejar vacío si no aplica)">

            <hr>
            <span class="seccion-titulo">Credenciales y Rol</span>

            <label>Correo Electrónico:</label>
            <input type="email" name="correo" placeholder="Correo Electrónico" required>
            
            <label>Contraseña:</label>
            <input type="password" name="password1" placeholder="Crea una Contraseña" required>
            
            <label>Confirme Contraseña:</label>
            <input type="password" name="confirmar_password" placeholder="Confirma tu Contraseña" required>

            <label>Rol solicitado:</label>
            <select name="rol_id">
                <option value="3">PSICÓLOGO</option>
                <option value="4">MÉDICO</option>
                <option value="5">ABOGADO</option>
                <option value="6">TRABAJADOR SOCIAL</option>
            </select>

            <input type="hidden" name="es_voluntario" value="0">

            {% if error_pass %}
            <div style="color: #d9534f; background: #f2dede; border: 1px solid #ebccd1; padding: 10px; margin-bottom: 15px; font-weight: bold; text-align: center; font-family: monospace;">
                {{ error_pass }}
            </div>
            {% endif %}

            <button type="submit">SOLICITAR REGISTRO</button>
        </form>
        <p style="text-align: center;"><a href="/">Volver al inicio</a></p>
    </div>
</body>
</html>
